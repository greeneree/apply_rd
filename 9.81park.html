<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4화 — 9.81파크 | JINK Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00d564;
    --primary-light: #e8faf2;
    --primary-dark: #00a84c;
    --accent: #ff6b6b;
    --warning: #f59e0b;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;
    --border: #e8e8e8;
    --bg: #ffffff;
    --bg-sub: #f8f8f8;
    --bg-dark: #1a1a1a;
    --star: #f5c518;
    --width: 960px;
  }

  /* ── [추가] 히어로 로고 이미지 스타일 ── */
  .hero-main-img {
    width: 100%;            /* 컨테이너 너비에 맞춤 */
    max-width: 960px;       /* 최대 너비 제한 */
    height: auto;           /* 높이 자동 조절 */
    aspect-ratio: 960 / 360; /* 이미지 비율 고정 (이미지 왜곡 방지) */
    object-fit: contain;    /* 이미지 비율 유지하며 영역 채움 */
    display: block;         /* 중앙 정렬을 위한 블록화 */
    margin: 0 auto 32px;    /* 중앙 정렬 및 하단 badge와의 간격 확보 */
    background: #fdfdfd;    /* 로고 배경이 투명할 경우를 대비한 미세 배경색 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* ... 기존 스타일 유지 ... */
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.7; }
  .header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 52px; display: flex; align-items: center; justify-content: space-between; max-width: 100%; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
  .breadcrumb { font-size: 0.8rem; color: var(--text-muted); }
  .breadcrumb span { color: var(--text-primary); font-weight: 500; }
  .back-btn { font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; text-decoration: none; transition: color 0.15s; }
  .back-btn:hover { color: var(--primary); }
  .container { max-width: var(--width); margin: 0 auto; padding: 0 40px 80px; }
  .hero { padding: 48px 0 40px; border-bottom: 1px solid var(--border); }
  .episode-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-dark); color: #fff; font-size: 0.72rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.05em; margin-bottom: 16px; }
  .episode-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
  .hero-title { font-family: 'Noto Serif KR', serif; font-size: 2.2rem; font-weight: 700; line-height: 1.35; color: var(--text-primary); margin-bottom: 12px; word-break: keep-all; }
  .hero-sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 28px; }
  /* ... 이하 스타일 생략 (기존과 동일) ... */
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">JINK</div>
    <div class="breadcrumb">포트폴리오 / <span>4화 · 9.81파크</span></div>
  </div>
  <a href="portfolio_webtoon.html" class="back-btn">← 목록으로</a>
</header>

<div class="container">

  <section class="hero">
    
    <img src="images/981park_logo.png" alt="9.81 PARK 로고" class="hero-main-img">

    <div class="episode-badge">
      <span class="dot"></span>
      4화
    </div>
    <h1 class="hero-title">9.81 파크<br>— 중력이 만든 게임, 오프라인을 온라인으로 이은 루프</h1>
    <p class="hero-sub">모노리스 · O2O 테마파크 앱 PO (1.0 구축 + 2.0 리뉴얼)</p>
    
    </section>
</div>
</body>
</html>
